<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>路线规划</title>
    <!-- 引入Vue 3 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <!-- 引入Element Plus -->
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css" />
    <script src="https://unpkg.com/element-plus"></script>
    <!-- 引入Leaflet地图库 -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- 引入Font Awesome图标 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />
    <!-- 引入自定义样式 -->
    <link rel="stylesheet" href="../styles/route-planning.css" />
</head>
<body>
    <div id="app">
        <el-container>
            <!-- 侧边栏 -->
            <el-aside width="350px">
                <div class="sidebar-header">
                    <h2>路线规划</h2>
                </div>

                <!-- 出行方式选择 -->
                <div class="transport-mode">
                    <el-radio-group v-model="transportMode" size="large">
                        <el-radio-button label="walking">
                            <i class="fas fa-walking"></i> 步行
                        </el-radio-button>
                        <el-radio-button label="driving">
                            <i class="fas fa-car"></i> 驾车
                        </el-radio-button>
                        <el-radio-button label="transit">
                            <i class="fas fa-bus"></i> 公交
                        </el-radio-button>
                    </el-radio-group>
                </div>

                <!-- 路线策略选择 -->
                <div class="route-strategy">
                    <el-radio-group v-model="routeStrategy" size="large">
                        <el-radio-button label="fastest">最快</el-radio-button>
                        <el-radio-button label="shortest">最短</el-radio-button>
                        <el-radio-button label="scenic">风景</el-radio-button>
                    </el-radio-group>
                </div>

                <!-- 起终点输入 -->
                <div class="route-inputs">
                    <el-input
                        v-model="startPoint"
                        placeholder="起点"
                        :disabled="true"
                        prefix-icon="el-icon-location"
                    >
                        <template #append>
                            <el-button @click="locateMe">
                                <i class="fas fa-crosshairs"></i>
                            </el-button>
                        </template>
                    </el-input>

                    <el-input
                        v-model="endPoint"
                        placeholder="终点"
                        :disabled="true"
                        prefix-icon="el-icon-location"
                    >
                        <template #append>
                            <el-button @click="clearMarkers">
                                <i class="fas fa-times"></i>
                            </el-button>
                        </template>
                    </el-input>

                    <el-button type="primary" @click="calculateRoute" :disabled="!startPoint || !endPoint" block>
                        规划路线
                    </el-button>
                </div>

                <!-- 路线详情 -->
                <div v-if="showRouteDetails" class="route-details">
                    <h3>路线详情</h3>
                    <div class="route-summary">
                        <div class="summary-item">
                            <i class="fas fa-road"></i>
                            <span>{{ routeDistance }} 公里</span>
                        </div>
                        <div class="summary-item">
                            <i class="fas fa-clock"></i>
                            <span>{{ routeDuration }} 分钟</span>
                        </div>
                    </div>

                    <el-divider />

                    <div class="route-steps">
                        <div v-for="(step, index) in routeSteps" :key="index" class="step-item">
                            <div class="step-icon">
                                <i :class="getStepIcon(step.type)"></i>
                            </div>
                            <div class="step-content">
                                <div class="step-instruction">{{ step.instruction }}</div>
                                <div class="step-distance">{{ (step.distance / 1000).toFixed(1) }} 公里</div>
                            </div>
                        </div>
                    </div>
                </div>
            </el-aside>

            <!-- 地图容器 -->
            <el-main>
                <div id="map"></div>
                <!-- 地图控制按钮 -->
                <div class="map-controls">
                    <el-button-group>
                        <el-button @click="zoomIn" icon="el-icon-plus" circle></el-button>
                        <el-button @click="zoomOut" icon="el-icon-minus" circle></el-button>
                        <el-button @click="locateMe" icon="el-icon-location" circle></el-button>
                    </el-button-group>
                </div>
            </el-main>
        </el-container>
    </div>

    <!-- 引入自定义脚本 -->
    <script src="../src/route-planning.js"></script>
</body>
</html>
